{% extends 'travel/base.html' %}
{% block title %}新規登録 - TravelPlan{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:28px;font-weight:700">✈ <span style="color:#2563eb">Travel</span>Plan</div>
    </div>
    <div class="card">
      <h2 style="font-size:18px;font-weight:600;margin-bottom:20px">新規登録</h2>
      {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>ユーザー名</label>
          <input type="text" name="username" placeholder="username" autofocus required>
        </div>
        <div class="form-group">
          <label>パスワード（4文字以上）</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">登録する</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:#666">
        すでにアカウントをお持ちの方は <a href="/login/">ログイン</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
