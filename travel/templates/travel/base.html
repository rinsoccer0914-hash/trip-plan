<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}TravelPlan{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}
.nav{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:18px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.nav-logo span{color:#2563eb}
.nav-spacer{flex:1}
.nav-user{font-size:13px;color:#666}
.nav a.nav-link{font-size:13px;color:#444;padding:6px 12px;border-radius:6px}
.nav a.nav-link:hover{background:#f0f0ec;text-decoration:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#fff;color:#444;border:1px solid #d0d0cc}
.btn-secondary:hover{background:#f5f5f0}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 12px;font-size:13px}
.container{max-width:1000px;margin:0 auto;padding:32px 24px}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid #d0d0cc;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.error-msg{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-move{background:#dbeafe;color:#1d4ed8}
.badge-eat{background:#fef3c7;color:#92400e}
.badge-see{background:#d1fae5;color:#065f46}
.badge-stay{background:#ede9fe;color:#4c1d95}
.badge-free{background:#f3f4f6;color:#374151}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-move{background:#3b82f6}
.dot-eat{background:#f59e0b}
.dot-see{background:#10b981}
.dot-stay{background:#8b5cf6}
.dot-free{background:#9ca3af}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% if user.is_authenticated %}
<nav class="nav">
  <div class="nav-logo">✈ <span>Travel</span>Plan</div>
  <div class="nav-spacer"></div>
  <a class="nav-link" href="/">マイプラン</a>
  <a class="nav-link" href="/cards/">予定カード</a>
  <span class="nav-user">{{ user.username }}</span>
  <form method="post" action="/logout/" style="margin:0"><input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
    <button type="submit" class="btn btn-secondary btn-sm">ログアウト</button>
  </form>
</nav>
{% endif %}
{% block content %}{% endblock %}
{% block extra_js %}{% endblock %}
</body>
</html>
